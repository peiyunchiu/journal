name: Daily Update

on:
  workflow_dispatch:
    inputs:
      force_regenerate:
        description: "Regenerate today's content instead of reusing the saved snapshot"
        required: false
        default: false
        type: boolean
  schedule:
    - cron: "10 16 * * *"

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  generate:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Generate daily content
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_TEXT_MODEL: gpt-4o-mini
          OPENAI_TTS_MODEL: gpt-4o-mini-tts
          FORCE_REGENERATE: ${{ inputs.force_regenerate && '1' || '0' }}
        run: python3 generate_daily.py

      - name: Ensure Pages metadata
        run: touch .nojekyll

      - name: Commit generated content
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add daily-content.js archive audio .nojekyll
          if git diff --cached --quiet; then
            echo "No generated changes to commit"
            exit 0
          fi
          git commit -m "chore: refresh daily spatial briefing"
          git push

  deploy:
    needs: generate
    if: always() && (needs.generate.result == 'success' || needs.generate.result == 'skipped')
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out latest main
        uses: actions/checkout@v4
        with:
          ref: main

      - name: Ensure Pages metadata
        run: touch .nojekyll

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
